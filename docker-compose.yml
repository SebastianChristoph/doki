services:
  frontend:
    build: ./frontend
    container_name: doki-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"
    networks:
      - internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      # non-www
      - "traefik.http.routers.doki.rule=Host(`doberlug-kirchhain-historische-fotos.de`)"
      - "traefik.http.routers.doki.entrypoints=websecure"
      - "traefik.http.routers.doki.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doki.middlewares=doki-hsts"
      - "traefik.http.services.doki.loadbalancer.server.port=80"
      - "traefik.http.middlewares.doki-hsts.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.doki-hsts.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.doki-hsts.headers.forceSTSHeader=true"
      # www → non-www redirect
      - "traefik.http.routers.doki-www.rule=Host(`www.doberlug-kirchhain-historische-fotos.de`)"
      - "traefik.http.routers.doki-www.entrypoints=websecure"
      - "traefik.http.routers.doki-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doki-www.middlewares=doki-www-redirect"
      - "traefik.http.middlewares.doki-www-redirect.redirectregex.regex=^https://www\\.doberlug-kirchhain-historische-fotos\\.de/(.*)"
      - "traefik.http.middlewares.doki-www-redirect.redirectregex.replacement=https://doberlug-kirchhain-historische-fotos.de/$${1}"
      - "traefik.http.middlewares.doki-www-redirect.redirectregex.permanent=true"

  backend:
    build: ./backend
    container_name: doki-backend
    restart: unless-stopped
    env_file: .env
    environment:
      ADMIN_PASSWORD_HASH: "$$2a$$12$$gQ77zmowFdmVclgIGMlRrOSAakLMIwDgjMs6Xiff5ux0ZuddSjKxS"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: doki-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge
  traefik-proxy:
    external: true
